# Intelligent Textbook — MkDocs Material configuration.
# Generated by the init-textbook skill. Customize as the book grows.
# Use the book-installer skill to add features incrementally
# (math, mascot, slides, learning graph viewer, etc.).

site_name: 'Learning Knowledge Graphs'
site_description: 'An interactive intelligent textbook teaching learning knowledge graphs: how to model, build, and use concept-dependency graphs for education.'
site_author: 'Milena Higgins'
site_url: 'https://milenacorn.github.io/learning-knowledge-graphs/'

# Hooks — runs local Python before/after page processing.
# `plugins/social_override.py` injects og:title, og:description, og:image,
# og:type, og:url, and twitter:* meta tags on every page using each page's
# frontmatter `title:` / `description:` / `image:` (falling back to the site-
# wide values and `img/cover.png`). This is the Cairo-free path to social-
# media previews — works without `pip install "mkdocs-material[imaging]"`.
# If the `social` plugin below is ever enabled, the same hook also rewrites
# its auto-generated `/assets/images/social/...` URLs to point at the
# declared cover image. Verify the result with `bk-check-social-cover`.
hooks:
  - plugins/social_override.py

# Repository
repo_name: 'GitHub Repo'
repo_url: 'https://github.com/milenacorn/learning-knowledge-graphs'
edit_uri: 'blob/main/docs'

# Copyright
copyright: 'Copyright &copy; 2026 Milena Higgins. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.'

# Navigation
# IMPORTANT: do NOT add `navigation.tabs` — these books use side navigation
# optimized for wide landscape screens.
nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md

  - Chapters:
      - List of Chapters: chapters/index.md
      - 1. Graph Fundamentals: chapters/01-graph-fundamentals/index.md
      - 2. Data Storage Paradigms and Graph Variants: chapters/02-data-storage-paradigms/index.md
      - 3. Taxonomies and Ontologies: chapters/03-taxonomies-and-ontologies/index.md
      - 4. Graph Data Models: chapters/04-graph-data-models/index.md
      - 5. Schema Design and Constraints: chapters/05-schema-design-constraints/index.md
      - 6. Semantic Web Standards: chapters/06-semantic-web-standards/index.md
      - 7. Building Knowledge Graphs from Data: chapters/07-building-knowledge-graphs/index.md
      - 8. Querying Knowledge Graphs: chapters/08-querying-knowledge-graphs/index.md
      - 9. Graph Algorithms and Analytics: chapters/09-graph-algorithms-analytics/index.md
      - 10. Knowledge Graphs and Machine Learning: chapters/10-knowledge-graphs-machine-learning/index.md
      - 11. Knowledge Graphs and Large Language Models: chapters/11-knowledge-graphs-llms/index.md
      - 12. Cross-Industry Applications: chapters/12-cross-industry-applications/index.md
      - 13. Litigation and Matter Knowledge Graphs: chapters/13-litigation-matter-graphs/index.md
      - 14. Contracts, IP, and Legal Standards: chapters/14-contracts-ip-legal-standards/index.md
      - 15. Governance and Maintenance: chapters/15-governance-and-maintenance/index.md

  - Learning Graph:
      - Introduction: learning-graph/index.md
      - Course Description Assessment: learning-graph/course-description-assessment.md
      - Concept Enumeration: learning-graph/concept-list.md
      - Graph Quality Analysis: learning-graph/quality-metrics.md
      - Concept Taxonomy: learning-graph/concept-taxonomy.md
      - Taxonomy Distribution Report: learning-graph/taxonomy-distribution.md

  - MicroSims:
      - List of MicroSims: sims/index.md
      - Learning Graph Viewer: sims/graph-viewer/index.md

  - License: license.md
  - Contact: contact.md

# Theme configuration
theme:
  name: material
  # Once a logo is generated, point this at docs/img/logo.png or a mascot pose:
  # logo: img/logo.png
  # favicon: img/favicon.ico
  palette:
    primary: 'blue'
    accent: 'amber'
  include_sidebar: true
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  # Uncomment after running `pip install "mkdocs-material[imaging]"`:
  # - social
  # Uncomment after running `pip install mkdocs-glightbox`:
  # - glightbox:
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  #     slide_effect: slide
  #     width: 100%
  #     height: auto
  #     zoomable: true
  #     draggable: true
  #     auto_caption: false
  #     caption_position: bottom
  #     skip_classes:
  #       - mascot-admonition-img   # keep mascot poses out of the lightbox gallery

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

# Custom CSS — file is created by init-textbook
extra_css:
  - css/extra.css

# Custom JavaScript — uncomment once a corresponding file exists
# extra_javascript:
#   - js/extra.js

# Exclude prompt scratch files and TODOs from build/search/sitemap
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/cover-prompt.md
  **/TODO.md

# Rebuild on changes during `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

# Extra
extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # MicroSim build-status indicators shown next to nav entries.
  # The status value is set per-page in the index.md frontmatter:
  #   status: scaffold | built | approved
  # Colors are defined as CSS custom properties in docs/css/extra.css.
  # Note: `theme.icon.status` is a Material Insiders feature and is silently
  # ignored on community Material. Do not add it — the CSS-variable approach
  # in extra.css is the load-bearing piece on the community edition.
  status:
    scaffold: Scaffold — placeholder, not yet implemented
    built: Built — implementation complete, awaiting review
    approved: Approved — tested and approved

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: 'Learning Knowledge Graphs'
  textbook_version: '0.1'

  # Google Analytics — uncomment once a property ID exists:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
